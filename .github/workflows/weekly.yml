name: Weekly scrape + digest

on:
  schedule:
    # Thursdays 12:00 UTC = 6 AM CST (winter) / 7 AM CDT (summer).
    # GitHub Actions cron does not observe DST.
    - cron: '0 12 * * 4'
  workflow_dispatch:
    inputs:
      baseline:
        description: 'Run as baseline (suppress digest, mark all rows as seed)'
        type: boolean
        default: false
      no_email:
        description: 'Skip sending emails'
        type: boolean
        default: false

concurrency:
  group: weekly-scrape
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    steps:
      - name: Checkout main
        uses: actions/checkout@v4

      - name: Report checked-out commit
        run: |
          echo "Commit SHA: $GITHUB_SHA"
          echo "Ref:        $GITHUB_REF"
          git log -1 --oneline

      - name: Pull existing db from data branch (if exists)
        run: |
          git fetch origin data:data 2>/dev/null || echo "data branch not yet created"
          git checkout data -- db/distress.db 2>/dev/null || echo "no existing db; starting fresh"
          ls -la db/ || true

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Run scrapers + send digests
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          DIGEST_FROM: ${{ secrets.DIGEST_FROM }}
          DIGEST_TO: ${{ secrets.DIGEST_TO }}
        run: |
          ARGS=""
          if [ "${{ inputs.baseline }}" = "true" ]; then ARGS="$ARGS --baseline"; fi
          if [ "${{ inputs.no_email }}" = "true" ]; then ARGS="$ARGS --no-email"; fi
          python run.py $ARGS

      - name: Dump scrape_runs to log
        if: always()
        run: |
          if [ -f db/distress.db ]; then
            python - <<'PY'
          import sqlite3
          conn = sqlite3.connect("db/distress.db")
          conn.row_factory = sqlite3.Row
          print("\n=== scrape_runs (latest per source) ===")
          for r in conn.execute("""
              SELECT source, status, rows_considered, rows_found, rows_new, error_message
              FROM scrape_runs
              WHERE id IN (SELECT MAX(id) FROM scrape_runs GROUP BY source)
              ORDER BY source
          """):
              err = f" — {r['error_message']}" if r['error_message'] else ""
              print(f"  {r['source']:<22} {r['status']:<8} considered={r['rows_considered']} kept={r['rows_found']} new={r['rows_new']}{err}")
          print("\n=== distress_notices counts by source (active) ===")
          for r in conn.execute("SELECT source, COUNT(*) AS n FROM distress_notices WHERE status='active' GROUP BY source ORDER BY source"):
              print(f"  {r['source']:<22} {r['n']}")
          PY
          else
            echo "No db/distress.db present."
          fi

      - name: Upload db as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: distress-db
          path: db/distress.db
          if-no-files-found: warn
          retention-days: 14

      - name: Commit updated db to data branch
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin data:data 2>/dev/null || git branch data
          git worktree add ../data-wt data
          mkdir -p ../data-wt/db
          cp db/distress.db ../data-wt/db/distress.db
          cd ../data-wt
          # Force-add: main's .gitignore blocks db/distress.db, but on the
          # data branch we explicitly want it committed.
          git add -f db/distress.db
          if git diff --cached --quiet; then
            echo "No db changes."
          else
            git commit -m "Update distress.db from run $GITHUB_RUN_ID"
            for i in 1 2 3 4; do
              if git push -u origin data; then break; fi
              echo "push failed; retry $i"; sleep $((2**i))
            done
          fi
